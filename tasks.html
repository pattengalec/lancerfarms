<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Farm Tasks · Lancer Farms</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="lfg-theme.css">
<script>
(function(){try{
  var t=sessionStorage.getItem('lfg-theme'); if(t)document.documentElement.setAttribute('data-theme',t);
  var v=localStorage.getItem('lfg-vis'); if(v==='high')document.documentElement.setAttribute('data-vis','high');
}catch(e){}})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Source+Sans+3:wght@300;400;600&family=Courier+Prime&display=swap');

:root {
  --soil:#2C1A0E; --bark:#4A2E1A; --straw:#C8A96E; --sage:#7A9E7E;
  --cream:#F5EFE0; --mist:#EAE4D4; --leaf:#3D6B45; --alert:#B85C2A;
  --white:#FDFAF4; --radius:12px; --shadow:0 2px 16px rgba(44,26,14,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--surface,var(--cream));color:var(--on-bg,var(--soil));min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}

.screen{display:none;width:100%;max-width:420px;min-height:100vh;background:var(--bg,var(--white));color:var(--on-bg,var(--soil));flex-direction:column;position:relative;overflow-y:auto;}
.screen.active{display:flex;}

.app-header{background:var(--surface,var(--soil));color:var(--on-accent,var(--straw));padding:18px 20px 14px;text-align:center;position:relative;}
.app-header h1{font-family:'IM Fell English',serif;font-size:1.45rem;letter-spacing:0.02em;line-height:1.2;}
.app-header p{font-family:'Courier Prime',monospace;font-size:0.7rem;color:var(--on-accent,var(--straw));opacity:0.7;margin-top:2px;letter-spacing:0.08em;text-transform:uppercase;}
.back-btn{position:absolute;left:16px;top:18px;background:none;border:none;color:var(--on-accent,var(--straw));font-size:1.4rem;cursor:pointer;padding:4px;line-height:1;text-decoration:none;}

.screen-body{flex:1;padding:20px 20px 40px;display:flex;flex-direction:column;gap:0;}

.login-block{background:var(--surface,var(--soil));border-radius:var(--radius);padding:28px 24px;text-align:center;margin:20px 0;}
.login-block h2{font-family:'IM Fell English',serif;color:var(--on-accent,var(--straw));font-size:1.3rem;margin-bottom:6px;}
.login-block p{font-size:0.8rem;color:var(--on-bg-soft,var(--bark));opacity:0.75;margin-bottom:20px;}
.login-block input{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(200,169,110,0.3);border-radius:8px;padding:12px 16px;font-size:1rem;color:var(--on-accent,var(--white));font-family:inherit;outline:none;margin-bottom:12px;text-align:center;letter-spacing:0.1em;}
.login-block button{width:100%;background:var(--straw,#C8A96E);color:var(--soil,#2C1A0E);border:none;border-radius:8px;padding:13px;font-size:0.95rem;font-family:'IM Fell English',serif;cursor:pointer;letter-spacing:0.04em;}

.prog-wrap{padding:16px 20px 12px;border-bottom:1px solid var(--mist);}
.prog-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.prog-count{font-family:'Courier Prime',monospace;font-size:0.72rem;color:var(--on-bg-soft,var(--bark));opacity:0.7;text-transform:uppercase;letter-spacing:0.06em;}
.prog-pct{font-family:'Courier Prime',monospace;font-size:0.72rem;color:var(--leaf);font-weight:600;}
.prog-track{height:4px;background:var(--mist);border-radius:2px;}
.prog-fill{height:100%;background:var(--leaf,#3D6B45);border-radius:2px;transition:width 0.3s;}

.task-section{padding:16px 20px 0;}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.section-badge{font-family:'IM Fell English',serif;font-size:0.95rem;font-weight:600;letter-spacing:0.02em;padding:4px 12px;border-radius:4px;text-transform:none;} 
.badge-urgent{background:#FCEBEB;color:#A32D2D;}
.badge-z1{background:#EAF3DE;color:#2d6a1f;}
.badge-z2{background:#E6F1FB;color:#185FA5;}
.badge-z3{background:#FAEEDA;color:#854F0B;}
.badge-routine{background:var(--mist);color:var(--bark);}
.section-title{font-family:'Courier Prime',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--on-bg-soft,var(--bark));opacity:0.65;}

.task-list{border:1px solid var(--mist);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid var(--mist);cursor:pointer;background:var(--card,var(--white));transition:background 0.1s;-webkit-tap-highlight-color:transparent;position:relative;}
.task-item:last-child{border-bottom:none;}
.task-item:active{background:var(--cream);}
.task-item.done{opacity:0.45;}
.task-item.done .task-text{text-decoration:line-through;}

.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.high{background:#E24B4A;}.med{background:#EF9F27;}.low{background:#639922;}

.checkbox{width:20px;height:20px;border:1.5px solid var(--mist);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--leaf);transition:all 0.15s;background:var(--white);}
.task-item.done .checkbox{background:var(--leaf,#3D6B45);border-color:var(--leaf,#3D6B45);color:var(--white);}

.task-text{font-size:0.9rem;line-height:1.45;color:var(--on-bg,var(--soil));font-weight:400;}
.task-meta{font-size:0.72rem;color:var(--on-bg-soft,var(--bark));opacity:0.65;margin-top:3px;font-family:'Courier Prime',monospace;}

.reset-notice{font-family:'Courier Prime',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--leaf);opacity:0.7;text-align:center;padding:6px 0 0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface,var(--soil));color:var(--on-accent,var(--straw));padding:11px 18px;border-radius:24px;font-size:0.82rem;font-family:'Courier Prime',monospace;transition:transform 0.3s ease;z-index:999;white-space:nowrap;display:flex;align-items:center;gap:12px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.undo-btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:var(--on-accent,var(--straw));border-radius:12px;padding:3px 10px;font-size:0.75rem;font-family:'Courier Prime',monospace;cursor:pointer;letter-spacing:0.04em;}

@media(min-width:900px){.screen{max-width:720px;}.screen-body{padding:28px 40px 60px;}}
</style>
<style id="lfg-bridge">
[data-theme="citrus"]{--soil:#5A3517;--bark:#8a4410;--straw:#F2C879;--sage:#6B8F3D;--cream:#FFF7E8;--mist:#FDEBD2;--leaf:#A65A14;--alert:#C84B2A;--white:#FFFFFF;}
[data-theme="night"]{--soil:#DCE8DA;--bark:#8FB896;--straw:#C9DCC9;--sage:#4F7A58;--cream:#16241A;--mist:#2c4233;--leaf:#3a5c42;--alert:#D88A5C;--white:#1F3326;--shadow:0 2px 16px rgba(0,0,0,0.4);}
[data-theme="phosphor"]{--soil:#33FF66;--bark:#1f9e44;--straw:#33FF66;--sage:#1f9e44;--cream:#0A0E0A;--mist:#1d3b1d;--leaf:#145c2c;--alert:#FFB000;--white:#0F1A10;--radius:3px;--shadow:none;}
[data-vis="high"]{--soil:#141a15;--bark:#2b332d;--straw:#FFFFFF;--sage:#2e5238;--cream:#FDFDFB;--mist:#cfcfc6;--leaf:#1e4226;--alert:#8a1f00;--white:#FFFFFF;--shadow:none;--radius:10px;}
</style>
</head>
<body>

<div class="toast" id="toast">
  <span id="toast-msg"></span>
  <button class="undo-btn" id="undo-btn" onclick="undoLast()" style="display:none">Undo</button>
</div>

<div class="screen active" id="screen-login">
  <div class="app-header">
    <h1>Lancer Farms & Gardens</h1>
    <p>Staff Access</p>
  </div>
  <div class="screen-body" style="justify-content:center;">
    <div class="login-block">
      <h2>Welcome Back</h2>
      <p>Enter the staff password to view today's tasks</p>
      <input type="password" id="login-pw" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">Enter</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-tasks">
  <div class="app-header">
    <a href="index.html" class="back-btn" aria-label="Back to dashboard">&#8249;</a>
    <h1>Farm Tasks</h1>
    <p id="visit-label">Today's work</p>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta">
      <span class="prog-count" id="prog-count">0 of 0 tasks remaining</span>
      <span class="prog-pct" id="prog-pct"></span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="screen-body" id="task-body"></div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwseMinOKfwzdSoxkL89o7YtGq2KrOD0FDemKwgkIsVhK-JU7lhGfOVAuDvUv3Qiefz_Q/exec';

const SECTIONS = [
  {
    badge:'badge-routine', label:'Every visit', resetNote:'Resets each Monday and Friday',
    tasks:[
      {id:'r1',type:'routine',priority:'high',text:'Walk all 3 zones — pull weeds from paths and bed edges',meta:'First 10 min · sets the tone'},
      {id:'r2',type:'routine',priority:'high',text:'Check Rain Dial — confirm zones ran, adjust if needed',meta:'5 min · everything depends on water'},
      {id:'r3',type:'routine',priority:'high',text:'Check Z2 crops — stress, pests, squirrel damage, harvest zucchini',meta:'5 min · unharvested zucchini shuts down production'},
      {id:'r4',type:'routine',priority:'med', text:'Turn weed pile with pitchfork (Fridays)',meta:'Fri · 15 min · builds free mulch'},
      {id:'r5',type:'routine',priority:'med', text:'Train trellis vine up arch — tie loose growth',meta:'5 min · weekly · Z3 entrance'},
      {id:'r6',type:'routine',priority:'med', text:'Document squirrel activity in Z2 — time, bed, damage',meta:'Ongoing · log time, crop affected, and damage observed'},
    ]
  },
  {
    badge:'badge-urgent', label:'Priority 1 — weed pile',
    tasks:[
      {id:'w1',type:'onetime',priority:'high',text:'Section pile into 3 smaller mounds with cardboard or tarp dividers',meta:'Mon Week 1 · 30 min · makes it look managed, not abandoned'},
      {id:'w2',type:'onetime',priority:'high',text:'Wet pile down and cover with tarp — hot-compost in place',meta:'Mon Week 1 · 15 min · reduces volume 50–60% in 2 weeks'},
      {id:'w3',type:'onetime',priority:'low', text:'Use broken-down material as mulch in Z3 empty beds',meta:'Week 3–4 · closes the loop visually'},
    ]
  },
  {
    badge:'badge-z3', label:'Zone 3 — NW wall · entrance',
    tasks:[
      {id:'z3a',type:'onetime',priority:'high',text:'Shape rosemary into a defined dome or column',meta:'Mon Week 1 · 20 min · immediate visual upgrade'},
      {id:'z3b',type:'onetime',priority:'high',text:'Deadhead knockout roses, shape canes, remove crossing branches',meta:'Mon Week 1 · 30 min · triggers rebloom in 6 weeks'},
      {id:'z3c',type:'onetime',priority:'high',text:'Plant cowpea at trellis base',meta:'Week 1 · free · dramatic visual by Week 4'},
      {id:'z3d',type:'onetime',priority:'high',text:'Edge all 7 Z3 bed borders with hoe',meta:'Fri Week 1 · 45 min · highest visual ROI of any task'},
      {id:'z3e',type:'onetime',priority:'med', text:'Slate tile labels on all Z3 beds via wetslide transfer',meta:'Fri Week 2 · materials on hand · 1 hr'},
      {id:'z3f',type:'onetime',priority:'med', text:'Mulch Z3 beds with composted weed material',meta:'Week 3–4 · free · unifies the look'},
      {id:'z3g',type:'onetime',priority:'low', text:'Start fall transplants indoors — tomato, pepper, broccoli',meta:'Week 4–5 · plant out Week 7 for mid-Aug student return'},
    ]
  },
  {
    badge:'badge-z1', label:'Zone 1 — NE wall',
    tasks:[
      {id:'z1a',type:'onetime',priority:'high',text:'Walk Z1 — assign each bed keep / remove / relocate',meta:'Mon Week 1 · 20 min · decide before you dig'},
      {id:'z1b',type:'onetime',priority:'high',text:'Divide overgrown aloe — 1 anchor plant per bed, pot the pups',meta:'Week 1–2 · aloe pups are currency with gardeners'},
      {id:'z1c',type:'onetime',priority:'high',text:'Cut lavender back 1/3, remove spent stalks, shape into mound',meta:'Week 1 · 30 min · triggers Sept rebloom'},
      {id:'z1d',type:'onetime',priority:'med', text:'Slate tile labels on Z1 beds — plant name + care notes',meta:'Fri Week 2 · materials on hand'},
      {id:'z1e',type:'onetime',priority:'low', text:'Embed NFC chips behind Z1 tile labels — links to lancerfarms.com',meta:'Week 3+ · requires zone pages live on site'},
    ]
  },
  {
    badge:'badge-z2', label:'Zone 2 — SW path · research beds',
    tasks:[
      {id:'z2a',type:'onetime',priority:'high',text:'Set Rain Dial: Z2 to 6am Mon/Wed/Fri for 20 min',meta:'Mon Week 1 · first thing on site · crops cannot wait'},
      {id:'z2b',type:'onetime',priority:'high',text:'Run each zone manually, flag cracked lines with tape',meta:'Week 1 · 30 min · find failures before crops do'},
      {id:'z2c',type:'onetime',priority:'high',text:'Repair flagged lines — drip couplings + goof plugs',meta:'Week 2 · $12 from $25 budget · OSH or Home Depot'},
      {id:'z2d',type:'onetime',priority:'med', text:'Side-dress Z2 crops with all-purpose fertilizer',meta:'Week 4 · $8 · students need visible results by August'},
      {id:'z2e',type:'onetime',priority:'low', text:'Label Z2 as Student Research Beds with 4x4 tiles',meta:'Week 2 · materials on hand · sets expectation for Aug'},
    ]
  },
];

const STORAGE_KEY = 'lfg-tasks-v1';
const RESET_KEY   = 'lfg-tasks-reset';

function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch(e){return {};}}
function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}}

function getVisitKey(){
  const now=new Date(), day=now.getDay();
  const back = day===1||day===5 ? 0 : day===0 ? 2 : day<5 ? day-1 : day-5;
  const d=new Date(now); d.setDate(d.getDate()-back);
  return d.toISOString().slice(0,10);
}

function maybeResetRoutine(state){
  const key=getVisitKey();
  if(localStorage.getItem(RESET_KEY)!==key){
    const all=SECTIONS.flatMap(s=>s.tasks);
    Object.keys(state).forEach(id=>{const t=all.find(t=>t.id===id);if(t&&t.type==='routine')delete state[id];});
    localStorage.setItem(RESET_KEY,key);
  }
  return state;
}

let undoTimer=null, lastAction=null;

function showToast(msg,withUndo){
  const toast=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('undo-btn').style.display=withUndo?'':'none';
  toast.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>{toast.classList.remove('show');lastAction=null;},3500);
}

function undoLast(){
  if(!lastAction)return;
  const state=loadState();
  delete state[lastAction.id];
  saveState(state);
  clearTimeout(undoTimer);
  document.getElementById('toast').classList.remove('show');
  if(lastAction.wasOnetime){renderTasks();}
  else{
    const el=document.getElementById('task-'+lastAction.id);
    if(el){el.classList.remove('done');el.querySelector('.checkbox').textContent='';}
    updateProgress();
  }
  lastAction=null;
}

function renderTasks(){
  const state=maybeResetRoutine(loadState());
  saveState(state);
  const body=document.getElementById('task-body');
  body.innerHTML='';
  const now=new Date();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('visit-label').textContent=days[now.getDay()]+' · '+now.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  SECTIONS.forEach(section=>{
    const visible=section.tasks.filter(t=>!(t.type==='onetime'&&state[t.id]));
    if(!visible.length)return;
    const wrap=document.createElement('div');
    wrap.className='task-section';
    const head=document.createElement('div');
    head.className='section-head';
    const badge=document.createElement('span');
    badge.className='section-badge '+section.badge;
    badge.textContent=section.label;
    head.appendChild(badge);
    wrap.appendChild(head);
    const list=document.createElement('div');
    list.className='task-list';
    visible.forEach(task=>{
      const isDone=!!state[task.id];
      const item=document.createElement('div');
      item.className='task-item'+(isDone?' done':'');
      item.id='task-'+task.id;
      item.innerHTML='<div class="dot '+task.priority+'"></div><div class="checkbox">'+(isDone?'&#10003;':'')+'</div><div><div class="task-text">'+task.text+'</div><div class="task-meta">'+task.meta+'</div></div>';
      item.addEventListener('click',()=>toggleTask(task));
      list.appendChild(item);
    });
    wrap.appendChild(list);
    if(section.resetNote){
      const note=document.createElement('p');
      note.className='reset-notice';
      note.textContent='↺ '+section.resetNote;
      wrap.appendChild(note);
    }
    body.appendChild(wrap);
  });

  const spacer=document.createElement('div');
  spacer.style.height='40px';
  body.appendChild(spacer);
  updateProgress();
}

function toggleTask(task){
  const state=loadState();
  if(state[task.id]){
    delete state[task.id];
    saveState(state);
    const el=document.getElementById('task-'+task.id);
    if(el){el.classList.remove('done');el.querySelector('.checkbox').textContent='';}
    updateProgress();
    return;
  }
  state[task.id]=Date.now();
  saveState(state);
  lastAction={id:task.id,wasOnetime:task.type==='onetime'};
  if(task.type==='onetime'){
    const el=document.getElementById('task-'+task.id);
    if(el){
      el.style.transition='all 0.3s';
      el.style.maxHeight=el.offsetHeight+'px';
      el.style.overflow='hidden';
      requestAnimationFrame(()=>{el.style.maxHeight='0';el.style.padding='0';el.style.opacity='0';});
      setTimeout(()=>renderTasks(),320);
    }
    showToast('Task done — removed from list',true);
  } else {
    const el=document.getElementById('task-'+task.id);
    if(el){el.classList.add('done');el.querySelector('.checkbox').textContent='&#10003;';}
    updateProgress();
    showToast('Checked off',true);
  }
}

function updateProgress(){
  const state=loadState();
  const all=SECTIONS.flatMap(s=>s.tasks.filter(t=>!(t.type==='onetime'&&state[t.id])));
  const total=all.length, done=all.filter(t=>state[t.id]).length, remaining=total-done;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-count').textContent=remaining===0?'All tasks complete!':remaining+' task'+(remaining===1?'':'s')+' remaining';
  document.getElementById('prog-pct').textContent=pct>0?pct+'%':'';
  document.getElementById('prog-fill').style.width=pct+'%';
}

async function doLogin(){
  const pw=document.getElementById('login-pw').value;
  if(!pw)return;
  try{
    const res=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({action:'checkPassword',bedId:'MASTER',password:pw})});
    const data=await res.json();
    if(data.ok){sessionStorage.setItem('adminToken',pw);showApp();}
    else showToast('Incorrect password',false);
  }catch(e){showToast('Could not connect — check signal',false);}
}

function showApp(){
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-tasks').classList.add('active');
  renderTasks();
}

document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('adminToken'))showApp();
  document.getElementById('login-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});
</script>
</body>
</html>
